<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ncqq Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./layout.css" />
    <link rel="stylesheet" href="./cards.css?v=split-20260618" />
    <link rel="stylesheet" href="./glass.css?v=refresh-clean-20260621" />
    <link rel="stylesheet" href="./stage.css?v=glass-up-float-20260621" />
    <link rel="stylesheet" href="./detail.css?v=no-mask-arc-20260617c" />
  </head>
  <body>
    <div class="scene-bg" aria-hidden="true">
      <img class="scene-mascot mascot-ncqq" src="./assets/mascot-ncqq.png" alt="" />
      <img class="scene-mascot mascot-astr" src="./assets/mascot-astr.png" alt="" />
    </div>
    <div class="shell app-frame">
      <aside class="side-rail" aria-label="主导航">
        <div class="rail-logo">ncqq</div>
        <nav id="view-tabs" class="view-tabs" aria-label="节点与页面切换"></nav>
        <button id="refresh" class="icon-button nav-refresh" type="button" title="刷新" aria-label="刷新">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M20 11a8 8 0 0 0-13.7-4.9L4 8.4" />
            <path d="M4 3.8v4.6h4.6" />
            <path d="M4 13a8 8 0 0 0 13.7 4.9L20 15.6" />
            <path d="M20 20.2v-4.6h-4.6" />
          </svg>
        </button>
      </aside>

      <main class="view-shell">
        <section id="view-instances" class="view-panel active" data-view-panel="instances">
          <div id="managers" class="manager-grid"></div>
        </section>
      </main>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>
    <div id="detail-modal" class="detail-modal" hidden>
      <section class="detail-card" role="dialog" aria-modal="true" aria-labelledby="detail-title">
        <button id="detail-close" class="detail-close" type="button" aria-label="关闭">×</button>
        <h2 id="detail-title"></h2>
        <div id="detail-body"></div>
      </section>
    </div>
    <div id="approval-modal" class="approval-modal" hidden>
      <section class="approval-dialog" role="dialog" aria-modal="true" aria-labelledby="approval-title">
        <h2 id="approval-title"></h2>
        <p id="approval-message"></p>
        <textarea id="approval-reason" rows="4" placeholder="填写拒绝原因"></textarea>
        <div class="approval-dialog-actions">
          <button id="approval-cancel" type="button">取消</button>
          <button id="approval-confirm" type="button">确认</button>
        </div>
      </section>
    </div>
    <script src="./preview-data.js" defer></script>
    <script src="./dashboard-utils.js?v=split-20260618" defer></script>
    <script src="./dashboard-renderers.js?v=beta-20260621" defer></script>
    <script src="./app.js?v=beta-20260621" defer></script>
  </body>
</html>
