<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ncqq Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="shell">
      <div class="overview-row">
        <section id="kpis" class="kpi-grid" aria-label="概览"></section>
        <button id="refresh" class="icon-button" type="button" title="刷新" aria-label="刷新">
          ↻
        </button>
      </div>

      <nav id="view-tabs" class="view-tabs" aria-label="页面切换">
        <button class="tab-button active" type="button" data-view="instances">实例</button>
        <button class="tab-button" type="button" data-view="bindings">绑定</button>
        <button class="tab-button" type="button" data-view="approvals">审批</button>
      </nav>

      <main class="view-shell">
        <section id="view-instances" class="view-panel active" data-view-panel="instances">
          <div class="section-head">
            <h2>实例</h2>
          </div>
          <div id="managers" class="manager-grid"></div>
        </section>

        <section id="view-bindings" class="view-panel" data-view-panel="bindings">
          <div class="section-head">
            <h2>绑定</h2>
          </div>
          <div id="bindings"></div>
        </section>

        <section id="view-approvals" class="view-panel" data-view-panel="approvals">
          <div class="section-head">
            <h2>审批</h2>
          </div>
          <div id="approvals"></div>
        </section>
      </main>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
